<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ablam İçin Özür Sayfası</title>
    <style>
        body {
            background-color: #ffc0cb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            max-width: 400px;
            width: 90%;
        }

        /* Fotoğraf Stili */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffc0cb;
            margin-bottom: 15px;
        }

        h1 {
            color: #d81b60;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            height: 80px;
            align-items: center;
        }

        button {
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #acceptBtn {
            background-color: #4caf50;
            color: white;
            z-index: 10;
        }

        #rejectBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
            left: 55%;
        }

        #finalMessage {
            display: none;
        }

        #finalMessage h2 {
            color: #2e7d32;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <img src="abla.jpg" alt="Ablamla Biz" class="profile-img" id="mainImg">
        
        <h1 id="questionText">Ablacım, beni affeder misin?</h1>
        
        <div class="btn-group" id="btnGroup">
            <button id="acceptBtn" onclick="acceptApology()">Nolur beni affet</button>
            <button id="rejectBtn" onmouseover="moveRejectButton()" onclick="rejectClicked()">asla</button>
        </div>

        <div id="finalMessage">
            <h2>ÇOK TEŞEKKÜR EDERİMM BİR DAHA SANA KARŞI KONUŞURKEN TERBİYESİZLİK YAPMIYCAM :)</h2>
            <div style="font-size: 40px;">💖✨🎈</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        let greenBtnScale = 1;
        let redBtnScale = 1;

        function moveRejectButton() {
            const redBtn = document.getElementById('rejectBtn');
            const greenBtn = document.getElementById('acceptBtn');
            
            redBtnScale -= 0.12;
            if (redBtnScale < 0.2) redBtnScale = 0.2;
            redBtn.style.transform = `scale(${redBtnScale})`;

            greenBtnScale += 0.15;
            greenBtn.style.transform = `scale(${greenBtnScale})`;

            const container = document.getElementById('mainContainer');
            const maxWidth = container.clientWidth - redBtn.clientWidth - 20;
            const maxHeight = container.clientHeight - redBtn.clientHeight - 20;

            redBtn.style.left = Math.random() * maxWidth + 'px';
            redBtn.style.top = Math.random() * maxHeight + 'px';
        }

        function rejectClicked() {
            moveRejectButton();
        }

        function acceptApology() {
            document.getElementById('questionText').style.display = 'none';
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('mainImg').style.display = 'none';
            
            const finalMessage = document.getElementById('finalMessage');
            finalMessage.style.display = 'block';

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
